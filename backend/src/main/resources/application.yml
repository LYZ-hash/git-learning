spring:
  application:
    name: taskflow-backend

  # H2 in-memory database configuration (dev only)
  datasource:
    url: jdbc:h2:mem:taskflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA/Hibernate configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop   # Auto-create tables on startup, drop on shutdown (dev only)
    show-sql: true            # Log generated SQL to console
    properties:
      hibernate:
        format_sql: true

  # H2 web console (accessible at http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
